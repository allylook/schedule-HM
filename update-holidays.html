<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"/><title>更新假日資料</title>
<style>
body{font-family:sans-serif;background:#1f5c9e;color:#fff;padding:40px;text-align:center;}
h1{font-size:22px;margin-bottom:8px;}
.info{background:rgba(0,0,0,0.2);border-radius:8px;padding:14px 20px;margin:0 auto 20px;font-size:13px;text-align:left;display:inline-block;line-height:2;}
button{padding:14px 32px;font-size:16px;background:#fff;color:#1f5c9e;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin:6px;}
button:disabled{background:rgba(255,255,255,0.3);color:#fff;cursor:default;}
#log{margin-top:24px;text-align:left;background:rgba(0,0,0,0.2);border-radius:8px;padding:16px;font-size:13px;line-height:1.8;}
.ok{color:#a8ffcc;}.err{color:#ffaaaa;}
</style></head>
<body>
<h1>📅 更新 2026 假日資料</h1>
<div class="info">
✅ 刪除：9/19、9/21（錯誤資料）<br>
✅ 新增：9/25 中秋節補假、9/26 中秋節<br>
✅ 新增：9/27 教師節、9/28 教師節補假<br>
✅ 新增：12/24 假期
</div>
<p style="opacity:.8">步驟：先登入 Google，再執行更新</p>
<button id="loginBtn">1. 用 Google 登入</button>
<button id="goBtn" disabled>2. 開始更新</button>
<div id="log"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const cfg={apiKey:"AIzaSyCi_-ARDDU1KadQ6vNkjSISNcqMnBPA6Mo",authDomain:"qiushan-schedule.firebaseapp.com",projectId:"qiushan-schedule",storageBucket:"qiushan-schedule.firebasestorage.app",messagingSenderId:"617610293986",appId:"1:617610293986:web:989f3d8b493bda0ffd24bb"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

const HOLIDAYS = {
  '1/1':'元旦','1/27':'農曆除夕補假','1/28':'農曆除夕',
  '1/29':'春節','1/30':'春節','1/31':'春節','2/1':'春節','2/2':'春節','2/3':'初六補假',
  '2/28':'和平紀念日','3/2':'和平紀念日補假',
  '4/3':'兒童節補假','4/4':'兒童節','4/5':'清明節',
  '5/1':'勞動節','5/31':'端午節','6/1':'端午節補假',
  '9/25':'中秋節補假','9/26':'中秋節','9/27':'教師節','9/28':'教師節補假',
  '10/9':'國慶日補假','10/10':'國慶日','10/26':'光復節補休',
  '12/24':'假期','12/25':'行憲紀念日'
};

function log(m,c=''){const el=document.getElementById('log');el.innerHTML+=`<div class="${c}">${m}</div>`;}

onAuthStateChanged(auth, user=>{
  if(user){
    log(`✅ 已登入：${user.email}`,'ok');
    document.getElementById('loginBtn').disabled=true;
    document.getElementById('loginBtn').textContent='✅ 已登入';
    document.getElementById('goBtn').disabled=false;
  }
});

document.getElementById('loginBtn').onclick=async()=>{
  try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ log('❌ 登入失敗：'+e.message,'err'); }
};

document.getElementById('goBtn').onclick=async()=>{
  const btn=document.getElementById('goBtn');
  btn.disabled=true; btn.textContent='更新中...';
  try{
    await setDoc(doc(db,'config','holidays_2026'),{data:HOLIDAYS});
    log(`✅ 假日更新完成（${Object.keys(HOLIDAYS).length} 天）`,'ok');
    log('已刪除：9/19、9/21','ok');
    log('已新增：9/25~9/28 中秋+教師節、12/24 假期','ok');
    log('🎉 請回到 schedule-hm.vercel.app 重新整理查看','ok');
    btn.textContent='✅ 完成';
  }catch(e){
    log('❌ 錯誤：'+e.message,'err');
    btn.disabled=false; btn.textContent='重試';
  }
};
</script>
</body></html>
